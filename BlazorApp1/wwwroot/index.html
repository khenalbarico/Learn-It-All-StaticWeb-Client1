<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn It All</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <meta name="theme-color" content="#D96A15" />
    <meta name="description" content="Browse, buy, and read your books from Learn It All." />
    <script>
        (function () {
            var stored = localStorage.getItem('theme');
            var theme = stored === 'dark' || stored === 'light'
                ? stored
                : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <!-- PLACEHOLDER client ID — replace ca-pub-0000000000000000 after AdSense approval (keep in sync with AdSenseWebCfg.cs) -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-0000000000000000"
            crossorigin="anonymous"></script>
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 8v4M12 16h.01" />
        </svg>
        <span>Something went wrong. Please reload the page to continue.</span>
        <a href="." class="reload">Reload</a>
        <span class="dismiss" title="Dismiss">🗙</span>
    </div>
    <script src="_content/Microsoft.Authentication.WebAssembly.Msal/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });

        // A new deployment's service worker now claims already-open tabs immediately
        // (see service-worker.published.js). Reload once when that handoff happens so
        // this tab picks up the matching new assets instead of continuing to run the
        // previous version's in-memory app against a service worker for a newer one.
        //
        // clients.claim() also fires 'controllerchange' the first time ANY worker takes
        // control of a page that had no controller yet (i.e. every normal first visit) -
        // that case must NOT reload, since nothing is stale, only an actual replacement
        // of a worker that was already controlling this page indicates a real update.
        let hadControllerAtLoad = !!navigator.serviceWorker.controller;
        let refreshingAfterControllerChange = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!hadControllerAtLoad) {
                hadControllerAtLoad = true;
                return;
            }
            if (refreshingAfterControllerChange) return;
            refreshingAfterControllerChange = true;
            window.location.reload();
        });
    </script>
</body>

</html>
